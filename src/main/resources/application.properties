spring.application.name=antigravity-log-analyzer

# Veritabanı Ayarları (Port 5433!)
spring.datasource.url=jdbc:postgresql://localhost:5433/loganalyzerdb
spring.datasource.username=loguser
spring.datasource.password=logpassword
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Ayarları
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Uygulama Portu (Diğer projeyle karışmasın)
server.port=8082